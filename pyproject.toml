[build-system]
requires = ["setuptools>=70"]
build-backend = "setuptools.build_meta"

[project]
name = "arbeitszeit"
version = "0.1.0"
description = "Lokales Zeiterfassungssystem für eine Zahnarztpraxis"
requires-python = ">=3.14,<3.15"
dependencies = [
    "evdev>=1.7",
    "reportlab>=4.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "pypdf>=4.0",
    "ruff>=0.6",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
